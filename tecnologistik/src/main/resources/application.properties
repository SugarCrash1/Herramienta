spring.application.name=sistema-tickets

server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ticket_system}
spring.datasource.username=${DB_USERNAME:ticket_user}
spring.datasource.password=${DB_PASSWORD:ticket123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE